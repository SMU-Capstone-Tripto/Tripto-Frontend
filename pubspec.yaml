name: tripto
description: 여행 플래닝 소셜 앱 - 졸업작품
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # 상태 관리
  flutter_riverpod: ^2.5.1

  # 네비게이션
  go_router: ^13.2.0

  # 네트워크
  http: ^1.2.1

  # 함수형 Either 타입
  dartz: ^0.10.1

  # 로컬 저장소
  shared_preferences: ^2.2.3

  # 유틸
  intl: ^0.19.0
  uuid: ^4.3.3

  cupertino_icons: ^1.0.8

  kakao_map_plugin: ^0.4.0
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
